name: PR Build & Test

on:
  pull_request:
    branches:
      - main

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        framework: [net8.0, net9.0, net10.0]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (core - ${{ matrix.framework }})
        run: dotnet test Blazor.ReduxTests/Blazor.ReduxTests.csproj --no-build --configuration Release -f ${{ matrix.framework }} --verbosity normal

      - name: Test (DevTools - ${{ matrix.framework }})
        run: dotnet test Blazor.Redux.DevToolsTests/Blazor.Redux.DevToolsTests.csproj --no-build --configuration Release -f ${{ matrix.framework }} --verbosity normal